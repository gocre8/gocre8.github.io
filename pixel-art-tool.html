<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Art Tool</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    #root { width: 100%; height: 100vh; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;


const CANVAS_SIZE = 512;
const MAX_VERSIONS = 10;
const MAX_HISTORY = 20;
const LS_KEY = 'pixelart-versions';

// ── OKLCH ↔ RGB ────────────────────────────────────────────────────────────────
function srgbToLinear(c) { return c <= 0.04045 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4); }
function linearToSrgb(c) { return c <= 0.0031308 ? 12.92*c : 1.055*Math.pow(c,1/2.4)-0.055; }
function oklchToRgb(L,C,H) {
  const h=(H*Math.PI)/180, a=C*Math.cos(h), b=C*Math.sin(h);
  const l_=L+0.3963377774*a+0.2158037573*b;
  const m_=L-0.1055613458*a-0.0638541728*b;
  const s_=L-0.0894841775*a-1.2914855480*b;
  const l=l_**3,m=m_**3,s=s_**3;
  return {
    r:Math.round(Math.max(0,Math.min(1,linearToSrgb(+4.0767416621*l-3.3077115913*m+0.2309699292*s)))*255),
    g:Math.round(Math.max(0,Math.min(1,linearToSrgb(-1.2684380046*l+2.6097574011*m-0.3413193965*s)))*255),
    b:Math.round(Math.max(0,Math.min(1,linearToSrgb(-0.0041960863*l-0.7034186147*m+1.7076147010*s)))*255),
  };
}
function rgbToOklch(r,g,b) {
  const rl=srgbToLinear(r/255),gl=srgbToLinear(g/255),bl=srgbToLinear(b/255);
  const l_=Math.cbrt(0.4122214708*rl+0.5363325363*gl+0.0514459929*bl);
  const m_=Math.cbrt(0.2119034982*rl+0.6806995451*gl+0.1073969566*bl);
  const s_=Math.cbrt(0.0883024619*rl+0.2817188376*gl+0.6299787005*bl);
  const Lo=0.2104542553*l_+0.7936177850*m_-0.0040720468*s_;
  const ao=1.9779984951*l_-2.4285922050*m_+0.4505937099*s_;
  const bo=0.0259040371*l_+0.7827717662*m_-0.8086757660*s_;
  let Ho=(Math.atan2(bo,ao)*180)/Math.PI; if(Ho<0)Ho+=360;
  return {L:Lo,C:Math.sqrt(ao**2+bo**2),H:Ho};
}
function hexToRgbObj(hex) {
  const h=hex.replace('#','');
  return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};
}
function rgbToHex(r,g,b) {
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
// Convert OKLCH directly to Display P3 — avoids the browser's sRGB-clamping path.
// Wider gamut means saturated yellows / cyans / greens that get clipped in sRGB
// can render closer to their true OKLCH values on a P3-capable display.
function lchToP3CSS(L, C, H) {
  const h = (H*Math.PI)/180, a = C*Math.cos(h), b = C*Math.sin(h);
  const l_ = L + 0.3963377774*a + 0.2158037573*b;
  const m_ = L - 0.1055613458*a - 0.0638541728*b;
  const s_ = L - 0.0894841775*a - 1.2914855480*b;
  const l = l_*l_*l_, m = m_*m_*m_, s = s_*s_*s_;
  // OKLab LMS → linear D65 P3 (composed: sRGB→P3 matrix × OKLab LMS→sRGB matrix)
  const rLin = +3.1276*l - 2.2570*m + 0.1294*s;
  const gLin = -1.0910*l + 2.4137*m - 0.3223*s;
  const bLin = -0.0259*l - 0.5080*m + 1.5340*s;
  const enc = v => { v = Math.max(0,Math.min(1,v)); return v<=0.0031308 ? 12.92*v : 1.055*Math.pow(v,1/2.4)-0.055; };
  return `color(display-p3 ${enc(rLin).toFixed(4)} ${enc(gLin).toFixed(4)} ${enc(bLin).toFixed(4)})`;
}

// For each hue, the L value at which max in-gamut chroma is highest in sRGB.
// This is the "cusp" — the naturally-saturated lightness for that hue.
// Yellow ≈ 0.95, green ≈ 0.87, cyan ≈ 0.91, blue ≈ 0.45, magenta ≈ 0.65, red ≈ 0.63.
const _cuspL = {};
function cuspL(H) {
  const k = Math.round(H);
  if (_cuspL[k] !== undefined) return _cuspL[k];
  let bestL = 0.5, bestC = 0;
  for (let L = 0.05; L < 0.99; L += 0.01) {
    const c = maxInGamutC(L, H);
    if (c > bestC) { bestC = c; bestL = L; }
  }
  return _cuspL[k] = bestL;
}

// Binary-search for the maximum OKLCH chroma that stays inside the sRGB gamut
// at a given L and H. Runs ~20 iterations of the color math — fast enough for real-time use.
function maxInGamutC(L, H) {
  const inGamut = (C) => {
    const h=(H*Math.PI)/180, a=C*Math.cos(h), b=C*Math.sin(h);
    const l_=L+0.3963377774*a+0.2158037573*b;
    const m_=L-0.1055613458*a-0.0638541728*b;
    const s_=L-0.0894841775*a-1.2914855480*b;
    const l=l_**3,m=m_**3,s=s_**3;
    const r=linearToSrgb(+4.0767416621*l-3.3077115913*m+0.2309699292*s);
    const g=linearToSrgb(-1.2684380046*l+2.6097574011*m-0.3413193965*s);
    const bv=linearToSrgb(-0.0041960863*l-0.7034186147*m+1.7076147010*s);
    return r>=0&&r<=1&&g>=0&&g<=1&&bv>=0&&bv<=1;
  };
  if(inGamut(0.4)) return 0.4;
  let lo=0, hi=0.4;
  for(let i=0;i<20;i++){const mid=(lo+hi)/2; if(inGamut(mid)) lo=mid; else hi=mid;}
  return lo;
}
// ── LCH pixel helpers ─────────────────────────────────────────────────────────
function lchToStyle(p){return p?`oklch(${p.L.toFixed(4)} ${p.C.toFixed(4)} ${p.H.toFixed(2)}deg)`:'#ffffff';}
function lchToHex(p){if(!p)return '#ffffff';const{r,g,b}=oklchToRgb(p.L,p.C,p.H);return rgbToHex(r,g,b);}
function blendLch(e,t,s){
  const ex=e??{L:1,C:0,H:t.H};
  const L=ex.L+(t.L-ex.L)*s, C=ex.C+(t.C-ex.C)*s;
  let dH=t.H-ex.H; if(dH>180)dH-=360; if(dH<-180)dH+=360;
  return{L,C:Math.max(0,C),H:((ex.H+dH*s)%360+360)%360};
}
function lchDistance(a,b){
  if(!a&&!b)return 0; if(!a||!b)return 1;
  const dL=a.L-b.L, dC=a.C-b.C;
  let dH=a.H-b.H; if(dH>180)dH-=360; if(dH<-180)dH+=360;
  return Math.sqrt(dL*dL+dC*dC+(dH/360)**2);
}
function lchMatch(a,b,tol){return lchDistance(a,b)<=(tol/100)*1.5;}
function migratePixels(rows){
  return rows.map(row=>row.map(cell=>{
    if(!cell)return null;
    if(typeof cell==='string'){const{r,g,b}=hexToRgbObj(cell);return rgbToOklch(r,g,b);}
    return cell;
  }));
}
const DITHER_MODES=[
  {label:'½',  desc:'Checkerboard',       test:(x,y)=>(x+y)%2===0},
  {label:'2',  desc:'2-gap grid',         test:(x,y)=>x%3===0&&y%3===0},
  {label:'3',  desc:'3-gap grid',         test:(x,y)=>x%4===0&&y%4===0},
  {label:'3½', desc:'3-gap + midpoints',  test:(x,y)=>(x%4===0&&y%4===0)||(x%4===2&&y%4===2)},
  {label:'4',  desc:'Diagonal, 2-apart',  test:(x,y)=>(x+y)%3===0},
];
function ditherPaint(cx, cy, color, prev, mode, gridSz) {
  const next=prev.map(r=>[...r]);
  if(cx>=0&&cx<gridSz&&cy>=0&&cy<gridSz&&DITHER_MODES[mode].test(cx,cy)) next[cy][cx]=color;
  return next;
}

// ── OKLCH Sliders ─────────────────────────────────────────────────────────────
// Accepts lch={L,C,H} and calls onChange({L,C,H}) — no hex conversion.
function OklchSliders({lch:lchProp, onChange}) {
  const [lch,setLch]=useState(lchProp);
  const skipRef=useRef(false);
  useEffect(()=>{
    if(skipRef.current){skipRef.current=false;return;}
    setLch(lchProp);
  },[lchProp.L,lchProp.C,lchProp.H]);
  const update=(newLch)=>{
    const maxC=maxInGamutC(newLch.L,newLch.H);
    const clamped={...newLch,C:Math.min(newLch.C,maxC)};
    skipRef.current=true;
    setLch(clamped);
    onChange(clamped);
  };
  const{L,C,H}=lch;
  const maxCVal=maxInGamutC(L,H);
  const maxCPct=Math.max(1,Math.round(maxCVal*100));
  const minC=Math.max(0.08,C);
  const lGrad=`linear-gradient(to right,oklch(0 ${C.toFixed(3)} ${H.toFixed(1)}deg),oklch(1 ${C.toFixed(3)} ${H.toFixed(1)}deg))`;
  const cGrad=`linear-gradient(to right,oklch(${L.toFixed(3)} 0 ${H.toFixed(1)}deg),oklch(${L.toFixed(3)} ${maxCVal.toFixed(3)} ${H.toFixed(1)}deg))`;
  const hGrad=`linear-gradient(to right,${[0,60,120,180,240,300,360].map(d=>`oklch(${Math.max(0.55,L).toFixed(2)} ${minC.toFixed(3)} ${d}deg)`).join(',')})`;
  const trackStyle=(grad)=>({WebkitAppearance:'none',appearance:'none',width:'100%',height:12,borderRadius:6,background:grad,outline:'none',cursor:'pointer',border:'1px solid #d1d5db',display:'block'});
  return (
    <div>
      <style>{`.lch-s::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:white;border:2px solid #44403c;box-shadow:0 1px 3px rgba(0,0,0,.4);cursor:pointer}.lch-s::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:white;border:2px solid #44403c;cursor:pointer}`}</style>
      {[
        {label:'L',unit:'%',val:+(L*100).toFixed(1),min:0,max:100,step:1,grad:lGrad,key:'L',toInt:v=>v/100},
        {label:'C',unit:'%',val:+(C*100).toFixed(1),min:0,max:maxCPct,step:0.5,grad:cGrad,key:'C',toInt:v=>v/100},
        {label:'H',unit:'°',val:+H.toFixed(1),min:0,max:360,step:1,grad:hGrad,key:'H',toInt:v=>v},
      ].map(({label,unit,val,min,max,step,grad,key,toInt})=>(
        <div key={key} style={{marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
            <span style={{fontSize:10,fontWeight:700}}>{label}</span>
            <span style={{fontSize:10,color:'#78716c'}}>{Math.round(val)}{unit}</span>
          </div>
          <input type="range" className="lch-s" min={min} max={max} step={step} value={val}
            onChange={e=>update({...lch,[key]:toInt(parseFloat(e.target.value))})}
            style={trackStyle(grad)}/>
        </div>
      ))}
      <div style={{fontFamily:'monospace',fontSize:10,color:'#78716c',textAlign:'center',marginTop:2}}>{lchToHex(lch).toUpperCase()}</div>
    </div>
  );
}

// ── Hue Wheel ─────────────────────────────────────────────────────────────────
const WHEEL_L = 0.65;
const MAX_CHROMA = 0.40;
const WHEEL_CENTER_FRAC = 0.125;

// gamma LUT — avoids Math.pow per pixel
const _gammaLUT = new Float32Array(1024);
for (let i=0;i<1024;i++){const v=i/1023;_gammaLUT[i]=v<=0.0031308?12.92*v:1.055*Math.pow(v,1/2.4)-0.055;}
const _gc = v => _gammaLUT[Math.round(Math.max(0,Math.min(1,v))*1023)];

function HueWheel({palette}) {
  const canvasRef=React.useRef(null);
  const SIZE=280, CX=SIZE/2, CY=SIZE/2, MAX_R=SIZE/2-16;
  React.useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const img=ctx.createImageData(SIZE,SIZE); const d=img.data;
    // precompute per-hue max gamut chroma at WHEEL_L
    const maxC=new Float32Array(360);
    for(let h=0;h<360;h++) maxC[h]=maxInGamutC(WHEEL_L,h);
    for(let py=0;py<SIZE;py++){
      for(let px=0;px<SIZE;px++){
        const dx=px-CX, dy=py-CY;
        const r=Math.sqrt(dx*dx+dy*dy);
        if(r>MAX_R) continue;
        const t=r/MAX_R;
        const H=((-(Math.atan2(dy,dx)*180/Math.PI))%360+360)%360;
        const hi=Math.round(H)%360;
        const C=t*maxC[hi];
        const hRad=H*Math.PI/180;
        const a=C*Math.cos(hRad), b=C*Math.sin(hRad);
        const l_=WHEEL_L+0.3963377774*a+0.2158037573*b;
        const m_=WHEEL_L-0.1055613458*a-0.0638541728*b;
        const s_=WHEEL_L-0.0894841775*a-1.2914855480*b;
        const lc=l_*l_*l_, mc=m_*m_*m_, sc=s_*s_*s_;
        const R= 4.0767416621*lc-3.3077115913*mc+0.2309699292*sc;
        const G=-1.2684380046*lc+2.6097574011*mc-0.3413193965*sc;
        const B=-0.0041960863*lc-0.7034186147*mc+1.7076147010*sc;
        const i4=(py*SIZE+px)*4;
        d[i4]=Math.round(_gc(R)*255); d[i4+1]=Math.round(_gc(G)*255);
        d[i4+2]=Math.round(_gc(B)*255); d[i4+3]=255;
      }
    }
    ctx.putImageData(img,0,0);
    ctx.beginPath(); ctx.arc(CX,CY,MAX_R,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=1; ctx.stroke();
  },[]);
  return (
    <div style={{position:'relative',width:SIZE,height:SIZE,flexShrink:0}}>
      <canvas ref={canvasRef} width={SIZE} height={SIZE} style={{display:'block'}}/>
      <svg width={SIZE} height={SIZE} style={{position:'absolute',top:0,left:0,overflow:'visible'}}>
        {[30,90,140,195,260,330].map(hue=>{
          const rad=(-hue)*Math.PI/180, labelR=MAX_R+10;
          const lx=CX+Math.cos(rad)*labelR, ly=CY+Math.sin(rad)*labelR;
          return <text key={hue} x={lx.toFixed(1)} y={ly.toFixed(1)} textAnchor="middle" dominantBaseline="middle"
            style={{fontSize:8,fill:'#78716c',fontFamily:'sans-serif',userSelect:'none'}}>{hue}</text>;
        })}
        {palette.filter(p=>p.color).map(({color,pct,L,C,H},i)=>{
          const chroma=Math.min(C??0,MAX_CHROMA);
          const orbitR=chroma<0.02?0:(chroma/maxInGamutC(WHEEL_L,H??0))*MAX_R;
          const rad=(-(H??0))*Math.PI/180;
          const x=CX+Math.cos(rad)*orbitR, y=CY+Math.sin(rad)*orbitR;
          const dotR=7+(pct/100)*9;
          const light=(L??0.5)>0.72;
          return (
            <g key={i}>
              <circle cx={x} cy={y} r={dotR+2.5} fill="white" opacity={0.6}/>
              <circle cx={x} cy={y} r={dotR} fill={color} stroke="white" strokeWidth={1.5}/>
              <text x={x} y={y+3.5} textAnchor="middle"
                style={{fontSize:8,fontWeight:700,fill:light?'#44403c':'white',fontFamily:'sans-serif'}}>
                {pct}%
              </text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

// ── Value Scale ───────────────────────────────────────────────────────────────
// Dots sit ON the bar, bar is wide enough to contain them.
function ValueScale({palette}) {
  const H=260, BAR_W=80, PAD_LEFT=28, PAD_RIGHT=8;
  const W=PAD_LEFT+BAR_W+PAD_RIGHT;
  const BAR_X=PAD_LEFT;
  const DOT_R=11;
  return (
    <svg width={W} height={H} style={{display:'block',flexShrink:0}}>
      <defs>
        <linearGradient id="vGrad2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="white"/>
          <stop offset="100%" stopColor="black"/>
        </linearGradient>
      </defs>
      {/* W / Bk labels */}
      <text x={BAR_X-4} y={10} textAnchor="end"
        style={{fontSize:10,fontWeight:700,fill:'#78716c',fontFamily:'sans-serif'}}>W</text>
      <text x={BAR_X-4} y={H} textAnchor="end"
        style={{fontSize:10,fontWeight:700,fill:'#78716c',fontFamily:'sans-serif'}}>Bk</text>
      {/* Gradient bar */}
      <rect x={BAR_X} y={0} width={BAR_W} height={H}
        fill="url(#vGrad2)" stroke="#d1d5db" strokeWidth={1} rx={3}/>
      {/* 25% tick labels */}
      {[0.25,0.5,0.75].map(f=>(
        <text key={f} x={BAR_X-4} y={f*H+4} textAnchor="end"
          style={{fontSize:8,fill:'#a8a29e',fontFamily:'sans-serif'}}>
          {Math.round((1-f)*100)}%
        </text>
      ))}
      {/* Palette dots ON the bar */}
      {palette.filter(p=>p.color).map(({color,pct,L},i)=>{
        const y=Math.max(DOT_R, Math.min(H-DOT_R, (1-(L??0.5))*H));
        const cx=BAR_X+BAR_W/2;
        const light=(L??0.5)>0.55;
        return (
          <g key={i}>
            <circle cx={cx} cy={y} r={DOT_R+1.5} fill="white" opacity={0.4}/>
            <circle cx={cx} cy={y} r={DOT_R} fill={color} stroke="rgba(0,0,0,0.25)" strokeWidth={1}/>
            <text x={cx} y={y+3.5} textAnchor="middle"
              style={{fontSize:7.5,fontWeight:700,fill:light?'#1c1917':'white',fontFamily:'sans-serif'}}>
              {pct}%
            </text>
          </g>
        );
      })}
    </svg>
  );
}

// ── Colour analysis strip ─────────────────────────────────────────────────────
const EMPTY_PALETTE=Array.from({length:5},()=>({color:null,pct:null,L:null,C:null,H:null}));

function ColourAnalysis({pixels,gridSize}) {
  const [palette,setPalette]=useState(EMPTY_PALETTE);

  const refresh=()=>{
    const counts={};
    for(let y=0;y<gridSize;y++)
      for(let x=0;x<gridSize;x++){
        const p=pixels[y]?.[x]??null;
        const key=p?`${p.L.toFixed(3)},${p.C.toFixed(3)},${p.H.toFixed(1)}`:'__null__';
        if(!counts[key])counts[key]={lch:p,count:0};
        counts[key].count++;
      }
    const total=Object.values(counts).reduce((a,b)=>a+b.count,0)||1;
    const top=Object.entries(counts)
      .sort((a,b)=>b[1].count-a[1].count).slice(0,5)
      .map(([,{lch,count}])=>{
        const color=lch?lchToHex(lch):'#ffffff';
        return{color,pct:Math.round((count/total)*100),L:lch?.L??1,C:lch?.C??0,H:lch?.H??0};
      });
    while(top.length<5)top.push({color:null,pct:null,L:null,C:null,H:null});
    setPalette(top);
  };

  const SWATCH=44; // px — height matches button

  return (
    <div style={{background:'#f5f5f4',borderTop:'1px solid #e7e5e4',padding:'10px 20px 16px',flexShrink:0}}>

      {/* ── Row 1: button + 5 swatches always visible ── */}
      <div style={{display:'flex',alignItems:'stretch',gap:6,marginBottom:12}}>

        {/* Palette button — ~2.5× swatch width */}
        <button onClick={refresh} style={{
          width: SWATCH*2.5, height: SWATCH, flexShrink:0,
          fontSize:11, fontWeight:700, letterSpacing:1,
          border:'2px solid #d1d5db', background:'white', cursor:'pointer',
        }}>↻ PALETTE</button>

        {/* 5 swatch slots — always rendered */}
        {palette.map(({color,pct},i)=>(
          <div key={i} style={{textAlign:'center',flexShrink:0}}>
            <div style={{
              width:SWATCH, height:SWATCH,
              backgroundColor: color??'#f5f5f4',
              border: color ? '2px solid #d1d5db' : '2px dashed #d1d5db',
            }}/>
            <div style={{fontSize:10,fontFamily:'monospace',color:'#44403c',fontWeight:600,marginTop:2,lineHeight:1}}>
              {color ? color.toUpperCase() : '—'}
            </div>
            <div style={{fontSize:13,color:'#78716c',fontWeight:700}}>
              {pct!==null ? `${pct}%` : '—'}
            </div>
          </div>
        ))}
      </div>

      {/* ── Row 2: hue wheel + value scale ── */}
      <div style={{display:'flex',alignItems:'flex-start',gap:20}}>
        <HueWheel palette={palette}/>
        <ValueScale palette={palette}/>
      </div>

    </div>
  );
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function floodFill(pixels,sx,sy,target,fill,tol,gs){
  const next=pixels.map(r=>[...r]),vis=Array.from({length:gs},()=>Array(gs).fill(false)),q=[[sx,sy]];
  while(q.length){const[x,y]=q.shift();if(x<0||x>=gs||y<0||y>=gs||vis[y][x])continue;if(!lchMatch(next[y][x],target,tol))continue;vis[y][x]=true;next[y][x]=fill?{...fill}:null;q.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);}
  return next;
}
function globalFill(pixels,target,fill,tol){return pixels.map(row=>row.map(c=>lchMatch(c,target,tol)?fill?{...fill}:null:c));}
function renderToDataURL(pixels,gs,size,withGrid=false){
  const ec=document.createElement('canvas');ec.width=size;ec.height=size;
  const ctx=ec.getContext('2d');
  ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,size,size);
  for(let y=0;y<gs;y++)for(let x=0;x<gs;x++)if(pixels[y]?.[x]){
    const px=Math.round(x*size/gs), py=Math.round(y*size/gs);
    const pw=Math.round((x+1)*size/gs)-px, ph=Math.round((y+1)*size/gs)-py;
    ctx.fillStyle=lchToStyle(pixels[y][x]);ctx.fillRect(px,py,pw,ph);
  }
  if(withGrid){
    const cell=size/gs;
    ctx.strokeStyle='#D1D5DB';ctx.lineWidth=0.5;
    for(let i=0;i<=gs;i++){ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,size);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*cell);ctx.lineTo(size,i*cell);ctx.stroke();}
  }
  return ec.toDataURL('image/png');
}
function resampleNearest(pixels,oldGs,newGs){
  return Array.from({length:newGs},(_,y)=>Array.from({length:newGs},(_,x)=>pixels[Math.floor((y/newGs)*oldGs)]?.[Math.floor((x/newGs)*oldGs)]??null));
}
function ResamplePreview({pixels,fromSize,toSize,previewPx=140}){
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current;if(!canvas)return;
    const ctx=canvas.getContext('2d'),rs=resampleNearest(pixels,fromSize,toSize),cell=previewPx/toSize;
    ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,previewPx,previewPx);
    for(let y=0;y<toSize;y++)for(let x=0;x<toSize;x++)if(rs[y]?.[x]){ctx.fillStyle=lchToStyle(rs[y][x]);ctx.fillRect(x*cell,y*cell,cell,cell);}
    ctx.strokeStyle='#D1D5DB';ctx.lineWidth=0.5;
    for(let i=0;i<=toSize;i++){ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,previewPx);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*cell);ctx.lineTo(previewPx,i*cell);ctx.stroke();}
  },[pixels,fromSize,toSize,previewPx]);
  return <canvas ref={ref} width={previewPx} height={previewPx} style={{width:previewPx,height:previewPx,imageRendering:'pixelated',display:'block'}}/>;
}

// ── App ───────────────────────────────────────────────────────────────────────
const PRESET_SIZES=[8,12,16,24,32,48,64];
const INIT_GRID=8;
const initPixels=()=>Array.from({length:INIT_GRID},()=>Array(INIT_GRID).fill(null));

function PixelArtTool() {
  const canvasRef=useRef(null);
  const initialPx=useRef(initPixels());

  const [pixels,setPixels]                 = useState(initialPx.current);
  const pixelsRef                          = useRef(initialPx.current);
  const [gridSize,setGridSize]             = useState(INIT_GRID);
  const [displaySize,setDisplaySize]       = useState(512);
  const [selectedLch,setSelectedLch]       = useState(()=>{const{r,g,b}=hexToRgbObj('#FF6B35');return rgbToOklch(r,g,b);});
  const [previousLch,setPreviousLch]       = useState(null);
  const [colorHistory,setColorHistory]     = useState([]);
  const [tool,setTool]                     = useState('draw');
  const [brushSize,setBrushSize]           = useState(1);
  const [fillMode,setFillMode]             = useState('contiguous');
  const [tolerance,setTolerance]           = useState(0);
  const [isDrawing,setIsDrawing]           = useState(false);

  // History
  const historyRef    = useRef([initialPx.current]);
  const historyIdxRef = useRef(0);
  const [historyState,setHistoryState] = useState({idx:0,len:1});
  const strokeStartRef = useRef(null);
  const canUndo = historyState.idx>0;
  const canRedo = historyState.idx<historyState.len-1;

  // Versions
  const [versions,setVersions]     = useState(()=>{try{const vs=JSON.parse(localStorage.getItem(LS_KEY))||[];return vs.map(v=>({...v,pixels:migratePixels(v.pixels)}));}catch{return [];}});
  const [editingId,setEditingId]   = useState(null);
  const [tempName,setTempName]     = useState('');
  const [exportURL,setExportURL]   = useState('');
  const [showExport,setShowExport] = useState(false);
  const [confirmLoad,setConfirmLoad]     = useState(null);
  const [confirmDelete,setConfirmDelete] = useState(null);
  const [confirmClear,setConfirmClear]   = useState(false);
  const [showResample,setShowResample]   = useState(false);
  const [showRandomFill,setShowRandomFill] = useState(false);
  const [targetSize,setTargetSize]       = useState(16);
  const [pdfStatus,setPdfStatus]         = useState('');
  const [blendStrength,setBlendStrength] = useState(100);
  const [ditherMode,setDitherMode]       = useState(0);
  const [showGrid,setShowGrid]           = useState(true);

  // ── Internal pixel setter (keeps ref in sync) ──────────────────────────────
  const setPixelsWithRef = useCallback((updater) => {
    setPixels(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      pixelsRef.current=next;
      return next;
    });
  },[]);

  // ── History ────────────────────────────────────────────────────────────────
  const pushHistory = useCallback((newPixels) => {
    const truncated=historyRef.current.slice(0,historyIdxRef.current+1);
    truncated.push(newPixels);
    if(truncated.length>MAX_HISTORY+1) truncated.shift();
    historyRef.current=truncated;
    historyIdxRef.current=truncated.length-1;
    setHistoryState({idx:historyIdxRef.current,len:truncated.length});
  },[]);

  const undo = useCallback(()=>{
    if(historyIdxRef.current>0){
      historyIdxRef.current--;
      const p=historyRef.current[historyIdxRef.current];
      pixelsRef.current=p; setPixels(p);
      setHistoryState({idx:historyIdxRef.current,len:historyRef.current.length});
    }
  },[]);

  const redo = useCallback(()=>{
    if(historyIdxRef.current<historyRef.current.length-1){
      historyIdxRef.current++;
      const p=historyRef.current[historyIdxRef.current];
      pixelsRef.current=p; setPixels(p);
      setHistoryState({idx:historyIdxRef.current,len:historyRef.current.length});
    }
  },[]);

  // ── Persist versions ───────────────────────────────────────────────────────
  useEffect(()=>{try{localStorage.setItem(LS_KEY,JSON.stringify(versions));}catch{}},[versions]);

  // ── Keyboard shortcuts ─────────────────────────────────────────────────────
  useEffect(()=>{
    const onKey=(e)=>{
      const tag=document.activeElement?.tagName?.toLowerCase();
      if(tag==='input'||tag==='textarea') return;
      if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();e.shiftKey?redo():undo();return;}
      if((e.ctrlKey||e.metaKey)&&e.key==='y'){e.preventDefault();redo();return;}
      const map={d:'draw',e:'erase',f:'fill',c:'eyedropper',x:'dither'};
      if(map[e.key.toLowerCase()]) setTool(map[e.key.toLowerCase()]);
    };
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[undo,redo]);

  // ── Render canvas ──────────────────────────────────────────────────────────
  const render=useCallback((pd,gs,sg)=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,CANVAS_SIZE,CANVAS_SIZE);
    // Integer-snap cell boundaries to eliminate sub-pixel gaps
    for(let y=0;y<gs;y++)for(let x=0;x<gs;x++)if(pd[y]?.[x]){
      const px=Math.round(x*CANVAS_SIZE/gs),py=Math.round(y*CANVAS_SIZE/gs);
      const pw=Math.round((x+1)*CANVAS_SIZE/gs)-px,ph=Math.round((y+1)*CANVAS_SIZE/gs)-py;
      ctx.fillStyle=lchToStyle(pd[y][x]);ctx.fillRect(px,py,pw,ph);
    }
    if(sg){
      const cell=CANVAS_SIZE/gs;
      ctx.strokeStyle='#D1D5DB';ctx.lineWidth=0.5;
      for(let i=0;i<=gs;i++){ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,CANVAS_SIZE);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*cell);ctx.lineTo(CANVAS_SIZE,i*cell);ctx.stroke();}
    }
  },[]);

  useEffect(()=>{render(pixels,gridSize,showGrid);},[pixels,gridSize,showGrid,render]);

  // ── Grid resize ────────────────────────────────────────────────────────────
  const handleGridSizeChange=(newSize)=>{
    setGridSize(newSize);
    setPixelsWithRef(prev=>Array.from({length:newSize},(_,y)=>Array.from({length:newSize},(_,x)=>prev[y]?.[x]??null)));
  };

  // ── Mouse → cell ───────────────────────────────────────────────────────────
  const getCellCoords=(e)=>{
    const canvas=canvasRef.current,rect=canvas.getBoundingClientRect();
    const x=(e.clientX-rect.left)*(CANVAS_SIZE/rect.width);
    const y=(e.clientY-rect.top)*(CANVAS_SIZE/rect.height);
    const cell=CANVAS_SIZE/gridSize;
    return{cx:Math.floor(x/cell),cy:Math.floor(y/cell)};
  };

  // ── Paint (centered, odd brush) ────────────────────────────────────────────
  const paintCells=useCallback((cx,cy,color,prev)=>{
    const offset=Math.floor((brushSize-1)/2);
    const next=prev.map(r=>[...r]);
    const strength=blendStrength/100;
    for(let dx=0;dx<brushSize;dx++)for(let dy=0;dy<brushSize;dy++){
      const px=cx-offset+dx,py=cy-offset+dy;
      if(px>=0&&px<gridSize&&py>=0&&py<gridSize){
        if(color===null) next[py][px]=null;
        else if(strength>=1) next[py][px]=color;
        else next[py][px]=blendLch(prev[py][px],color,strength);
      }
    }
    return next;
  },[brushSize,gridSize,blendStrength]);

  const addToHistory2=(lch)=>{const hex=lchToHex(lch);setColorHistory(prev=>[{lch,hex},...prev.filter(c=>c.hex!==hex)].slice(0,10));};

  // ── Pointer events ─────────────────────────────────────────────────────────
  const handleMouseDown=(e)=>{
    setIsDrawing(true);
    const{cx,cy}=getCellCoords(e);
    if(tool==='draw'){
      setPreviousLch(selectedLch);
      strokeStartRef.current=pixelsRef.current;
      setPixelsWithRef(prev=>paintCells(cx,cy,selectedLch,prev));
      addToHistory2(selectedLch);
    } else if(tool==='erase'){
      strokeStartRef.current=pixelsRef.current;
      setPixelsWithRef(prev=>paintCells(cx,cy,null,prev));
    } else if(tool==='eyedropper'){
      const lch=pixels[cy]?.[cx];
      if(lch){setPreviousLch(selectedLch);setSelectedLch(lch);addToHistory2(lch);}
      setTool('draw');
    } else if(tool==='fill'){
      setPreviousLch(selectedLch);
      const target=pixels[cy]?.[cx]??null;
      setPixelsWithRef(prev=>{
        const next=fillMode==='contiguous'
          ?floodFill(prev,cx,cy,target,selectedLch,tolerance,gridSize)
          :globalFill(prev,target,selectedLch,tolerance);
        pushHistory(next);
        return next;
      });
      addToHistory2(selectedLch);
    } else if(tool==='dither'){
      setPreviousLch(selectedLch);
      strokeStartRef.current=pixelsRef.current;
      setPixelsWithRef(prev=>ditherPaint(cx,cy,selectedLch,prev,ditherMode,gridSize));
      addToHistory2(selectedLch);
    }
  };

  const handleMouseMove=(e)=>{
    if(!isDrawing||(tool!=='draw'&&tool!=='erase'&&tool!=='dither')) return;
    const{cx,cy}=getCellCoords(e);
    if(tool==='dither') setPixelsWithRef(prev=>ditherPaint(cx,cy,selectedLch,prev,ditherMode,gridSize));
    else setPixelsWithRef(prev=>paintCells(cx,cy,tool==='draw'?selectedLch:null,prev));
  };

  const handleMouseUp=useCallback(()=>{
    setIsDrawing(false);
    if(strokeStartRef.current!==null){
      pushHistory(pixelsRef.current);
      strokeStartRef.current=null;
    }
  },[pushHistory]);

  // ── Versions ───────────────────────────────────────────────────────────────
  const saveVersion=()=>{
    const num=(versions[versions.length-1]?.num??0)+1;
    setVersions(prev=>[...prev.slice(-(MAX_VERSIONS-1)),{
      id:Date.now(),name:`Design ${num}`,num,pixels,gridSize,
      thumb:renderToDataURL(pixels,gridSize,80),
      savedAt:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    }]);
  };
  const loadVersion=(v)=>{setGridSize(v.gridSize);setPixelsWithRef(v.pixels);setConfirmLoad(null);};
  const deleteVersion=(id)=>setVersions(prev=>prev.filter(v=>v.id!==id));
  const handleExport=(pd=pixels,gs=gridSize)=>{setExportURL(renderToDataURL(pd,gs,CANVAS_SIZE,false));setShowExport(true);};
  const commitRename=()=>{if(editingId===null)return;setVersions(prev=>prev.map(v=>v.id===editingId?{...v,name:tempName||v.name}:v));setEditingId(null);};

  // ── Export all PDF ─────────────────────────────────────────────────────────
  const handleExportAllPDF=async()=>{
    if(versions.length===0){setPdfStatus('error');return;}
    setPdfStatus('loading');
    try{
      if(!window.jspdf){
        await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
      }
      const{jsPDF}=window.jspdf;
      const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const pageW=210,pageH=297,imgSize=160,imgX=(pageW-imgSize)/2,imgY=30;
      versions.forEach((v,i)=>{
        if(i>0) pdf.addPage();
        pdf.setFontSize(18);pdf.setFont('helvetica','bold');pdf.text(v.name,pageW/2,20,{align:'center'});
        pdf.addImage(renderToDataURL(v.pixels,v.gridSize,512,false),'PNG',imgX,imgY,imgSize,imgSize);
        pdf.setFontSize(10);pdf.setFont('helvetica','normal');pdf.setTextColor(120,113,108);
        pdf.text(`${v.gridSize}×${v.gridSize} pixels  ·  Saved ${v.savedAt}`,pageW/2,imgY+imgSize+10,{align:'center'});
        pdf.setFontSize(9);pdf.text(`${i+1} / ${versions.length}`,pageW/2,pageH-10,{align:'center'});
      });
      pdf.save('pixel-art-designs.pdf');
      setPdfStatus('');
    }catch(err){console.error(err);setPdfStatus('error');}
  };

  const applyRandomFill=()=>{
    const H=Math.random()*360;
    const L=0.35+Math.random()*0.45;
    const maxC=maxInGamutC(L,H);
    const C=Math.max(0,0.05+Math.random()*(maxC-0.05));
    const color={L,C,H};
    const filled=Array.from({length:gridSize},()=>Array(gridSize).fill(color));
    setPixelsWithRef(filled);
    pushHistory(filled);
    setShowRandomFill(false);
  };

  const toolList=[
    {id:'draw',       label:'Draw',       cursor:'crosshair', key:'D'},
    {id:'erase',      label:'Erase',      cursor:'cell',      key:'E'},
    {id:'fill',       label:'Fill',       cursor:'copy',      key:'F'},
    {id:'eyedropper', label:'Eyedropper', cursor:'crosshair', key:'C'},
    {id:'dither',     label:'Dither',     cursor:'crosshair', key:'X'},
  ];

  return (
    <div className="flex min-h-screen bg-white text-black select-none">

      {/* ── Left Sidebar ── */}
      <div className="w-56 bg-stone-50 border-r border-stone-200 p-4 overflow-y-auto flex flex-col gap-4 flex-shrink-0 sticky top-0 h-screen">
        <h1 className="text-base font-bold tracking-widest">PIXEL</h1>

        {/* Tools */}
        <div className="space-y-1">
          {toolList.map(t=>(
            <button key={t.id} onClick={()=>setTool(t.id)}
              className={`w-full py-2 px-3 text-xs font-medium border-2 text-left transition-colors flex justify-between items-center ${
                tool===t.id?'border-stone-900 bg-white':'border-stone-200 bg-white hover:border-stone-400'}`}>
              <span>{t.label}</span>
              <span className="text-stone-400 font-mono">{t.key}</span>
            </button>
          ))}
        </div>

        {/* Undo / Redo */}
        <div className="flex gap-1">
          <button onClick={undo} disabled={!canUndo}
            title="Undo (Ctrl+Z)"
            className="flex-1 py-1.5 text-xs font-medium border-2 border-stone-300 hover:border-stone-600 disabled:opacity-30 disabled:cursor-not-allowed">
            ↩ Undo
          </button>
          <button onClick={redo} disabled={!canRedo}
            title="Redo (Ctrl+Shift+Z)"
            className="flex-1 py-1.5 text-xs font-medium border-2 border-stone-300 hover:border-stone-600 disabled:opacity-30 disabled:cursor-not-allowed">
            ↪ Redo
          </button>
        </div>

        {/* Fill options */}
        {tool==='fill'&&(
          <div className="bg-stone-100 border border-stone-200 p-3 space-y-3">
            <div className="flex gap-1">
              {[['contiguous','Flood'],['global','Global']].map(([mode,label])=>(
                <button key={mode} onClick={()=>setFillMode(mode)}
                  className={`flex-1 py-1 text-xs font-medium border-2 ${fillMode===mode?'bg-stone-900 text-white border-stone-900':'border-stone-300 bg-white'}`}>
                  {label}
                </button>
              ))}
            </div>
            <div>
              <div className="flex justify-between mb-1">
                <label className="text-xs font-bold">Tolerance</label>
                <span className="text-xs text-stone-400">{tolerance}%</span>
              </div>
              <input type="range" min="0" max="100" value={tolerance}
                onChange={e=>setTolerance(parseInt(e.target.value))} className="w-full"/>
              <p className="text-xs text-stone-400 mt-1">
                {tolerance===0?'Exact match':tolerance<40?'Similar shades':'Wide range'}
              </p>
            </div>
          </div>
        )}

        {/* Dither options */}
        {tool==='dither'&&(
          <div className="bg-stone-100 border border-stone-200 p-3 space-y-3">
            <div>
              <label className="block text-xs font-bold mb-2">Pattern</label>
              <div className="flex gap-1">
                {DITHER_MODES.map((m,i)=>(
                  <button key={i} onClick={()=>setDitherMode(i)}
                    className={`flex-1 py-1 border-2 text-xs font-medium ${ditherMode===i?'bg-stone-900 text-white border-stone-900':'border-stone-300'}`}>
                    {m.label}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label className="block text-xs text-stone-400 mb-1">Pattern preview</label>
              <div style={{display:'grid',gridTemplateColumns:'repeat(8,10px)',gap:1,width:'fit-content'}}>
                {Array.from({length:64},(_,i)=>{
                  const x=i%8,y=Math.floor(i/8),filled=DITHER_MODES[ditherMode].test(x,y);
                  return <div key={i} style={{width:10,height:10,backgroundColor:filled?lchToHex(selectedLch):'#e7e5e4',border:'1px solid #d1d5db'}}/>;
                })}
              </div>
              <p className="text-xs text-stone-400 mt-1">{DITHER_MODES[ditherMode].desc}</p>
            </div>
          </div>
        )}

        {/* View */}
        <div>
          <label className="block text-xs font-bold mb-1">View: {displaySize}px</label>
          <input type="range" min="100" max="2000" step="10" value={displaySize}
            onChange={e=>setDisplaySize(parseInt(e.target.value))} className="w-full"/>
        </div>

        {/* Brush — hidden for fill and dither */}
        {(tool==='draw'||tool==='erase')&&(
          <div>
            <label className="block text-xs font-bold mb-1">Brush</label>
            <div className="flex gap-1">
              {[1,3,5].map(s=>(
                <button key={s} onClick={()=>setBrushSize(s)}
                  className={`flex-1 py-1 border-2 text-xs font-medium ${brushSize===s?'bg-stone-900 text-white border-stone-900':'border-stone-300'}`}>
                  {s}px
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Strength — draw tool only */}
        {tool==='draw'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <label className="text-xs font-bold">Strength</label>
              <span className="text-xs text-stone-400">{blendStrength}%</span>
            </div>
            <input type="range" min="10" max="100" step="5" value={blendStrength}
              onChange={e=>setBlendStrength(parseInt(e.target.value))} className="w-full"/>
            <p className="text-xs text-stone-400 mt-1">
              {blendStrength===100?'Full paint':blendStrength>=60?'Heavy blend':blendStrength>=30?'Soft glaze':'Subtle tint'}
            </p>
          </div>
        )}

        {/* Actions */}
        <div className="mt-auto space-y-2">
          <button onClick={saveVersion} disabled={versions.length>=MAX_VERSIONS}
            className="w-full py-2 px-3 text-xs font-medium bg-stone-700 text-white border-2 border-stone-700 hover:bg-stone-600 disabled:opacity-40">
            Save Version{versions.length>=MAX_VERSIONS?' (max)':''}
          </button>
          <button onClick={()=>setConfirmClear(true)}
            className="w-full py-2 px-3 text-xs font-medium bg-stone-100 border-2 border-stone-300 hover:bg-stone-200">
            Clear Canvas
          </button>
          <button onClick={()=>{
            const isEmpty=pixels.every(r=>r.every(c=>c===null));
            if(isEmpty) applyRandomFill(); else setShowRandomFill(true);
          }}
            className="w-full py-2 px-3 text-xs font-medium bg-stone-100 border-2 border-stone-300 hover:bg-stone-200">
            Random Fill
          </button>
          <button onClick={()=>{setTargetSize(gridSize>16?16:32);setShowResample(true);}}
            className="w-full py-2 px-3 text-xs font-medium bg-white border-2 border-stone-400 hover:bg-stone-100">
            Resample…
          </button>
          <button onClick={()=>handleExport()}
            className="w-full py-2 px-3 text-xs font-medium bg-stone-900 text-white border-2 border-stone-900 hover:bg-stone-700">
            Export PNG
          </button>
        </div>
      </div>

      {/* ── Centre: canvas top, colour analysis below ── */}
      <div className="flex-1 flex flex-col bg-stone-100 min-w-0">
        {/* Canvas */}
        <div className="flex justify-center items-start p-6 pb-3 flex-shrink-0">
          <div className="flex flex-col items-center">
            <div className="border-2 border-stone-400 shadow-xl" style={{width:displaySize,height:displaySize}}>
              <canvas
                ref={canvasRef}
                width={CANVAS_SIZE} height={CANVAS_SIZE}
                onMouseDown={handleMouseDown}
                onMouseMove={handleMouseMove}
                onMouseUp={handleMouseUp}
                onMouseLeave={handleMouseUp}
                style={{display:'block',width:'100%',height:'100%',imageRendering:'pixelated',
                  cursor:toolList.find(t=>t.id===tool)?.cursor||'crosshair'}}
              />
            </div>
            <p className="mt-2 text-xs text-stone-400 font-mono">
              {gridSize}×{gridSize} · {tool}
              {(tool==='draw'||tool==='erase')?` · ${brushSize}px`:''}
              {tool==='draw'&&blendStrength<100?` · ${blendStrength}%`:''}
              {tool==='dither'?` · ${DITHER_MODES[ditherMode].label}`:''}
              {tool==='fill'?` · ${fillMode} tol ${tolerance}%`:''}
            </p>
          </div>
        </div>

        {/* Colour analysis strip */}
        <ColourAnalysis pixels={pixels} gridSize={gridSize}/>

        {/* ── Versions strip ── */}
        <div className="border-t border-stone-200 bg-stone-50 flex-shrink-0">
          <div className="flex items-center justify-between px-3 py-2 border-b border-stone-200">
            <p className="text-xs font-bold tracking-wide">VERSIONS</p>
            <div className="flex items-center gap-3">
              <p className="text-xs text-stone-400">{versions.length}/{MAX_VERSIONS}</p>
              <button onClick={handleExportAllPDF} disabled={versions.length===0||pdfStatus==='loading'}
                className="py-1 px-2 text-xs font-medium bg-amber-700 text-white border border-amber-700 hover:bg-amber-600 disabled:opacity-40">
                {pdfStatus==='loading'?'Building…':`Export PDF (${versions.length})`}
              </button>
            </div>
          </div>
          <div className="flex gap-2 overflow-x-auto p-2" style={{minHeight:versions.length===0?48:undefined}}>
            {versions.length===0
              ? <p className="text-xs text-stone-400 self-center px-2">Hit "Save Version" to checkpoint your work.</p>
              : [...versions].reverse().map(v=>(
                <div key={v.id} className="flex-shrink-0 w-24 bg-white border-2 border-stone-200 hover:border-stone-400 transition-colors">
                  <div className="relative group cursor-pointer" onClick={()=>setConfirmLoad(v)}>
                    <img src={v.thumb} alt={v.name} style={{width:'100%',aspectRatio:'1',imageRendering:'pixelated',display:'block'}}/>
                    <div className="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-25 flex items-center justify-center transition-all">
                      <span className="text-white text-xs font-bold opacity-0 group-hover:opacity-100 drop-shadow">Load</span>
                    </div>
                  </div>
                  <div className="p-1">
                    {editingId===v.id
                      ? <input autoFocus value={tempName} onChange={e=>setTempName(e.target.value)}
                          onBlur={commitRename} onKeyDown={e=>{if(e.key==='Enter')commitRename();if(e.key==='Escape')setEditingId(null);}}
                          className="w-full text-xs border border-stone-400 px-1 py-0.5 outline-none"/>
                      : <p className="text-xs font-medium truncate cursor-text" title="Double-click to rename"
                          onDoubleClick={()=>{setEditingId(v.id);setTempName(v.name);}}>{v.name}</p>
                    }
                    <p className="text-xs text-stone-400">{v.gridSize}×{v.gridSize}</p>
                    <div className="flex gap-1 mt-1">
                      <button onClick={()=>handleExport(v.pixels,v.gridSize)} className="flex-1 text-xs py-0.5 bg-stone-100 hover:bg-stone-200 border border-stone-300">PNG</button>
                      <button onClick={()=>setConfirmDelete(v)} className="flex-1 text-xs py-0.5 bg-red-50 hover:bg-red-100 border border-red-200 text-red-600">Del</button>
                    </div>
                  </div>
                </div>
              ))
            }
          </div>
          {pdfStatus==='error'&&<p className="text-xs text-red-500 px-3 pb-2">{versions.length===0?'Save a version first.':'PDF failed.'}</p>}
        </div>
      </div>

      {/* ── Right: Color / OKLCH ── */}
      <div className="w-56 bg-stone-50 border-l border-stone-200 p-4 overflow-y-auto flex flex-col gap-4 flex-shrink-0 sticky top-0 h-screen">
        {/* Grid toggle */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span className="text-xs font-bold">Grid</span>
          <button onClick={()=>setShowGrid(g=>!g)}
            style={{width:40,height:22,borderRadius:11,background:showGrid?'#1c1917':'#d1d5db',
              position:'relative',cursor:'pointer',border:'none',flexShrink:0,transition:'background 0.2s'}}>
            <span style={{position:'absolute',top:3,left:showGrid?21:3,width:16,height:16,borderRadius:'50%',
              background:'white',transition:'left 0.18s',boxShadow:'0 1px 3px rgba(0,0,0,.35)'}}/>
          </button>
        </div>
        <label className="block text-xs font-bold">Color · OKLCH</label>
        <div>
          <div style={{display:'flex',height:44,border:'2px solid #d1d5db',flexShrink:0}}>
            <div style={{flex:1,backgroundColor:previousLch?lchToHex(previousLch):'#e7e5e4'}}/>
            <div style={{flex:1,backgroundColor:lchToHex(selectedLch)}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
            <span style={{fontSize:9,fontFamily:'monospace',color:'#78716c'}}>prev</span>
            <span style={{fontSize:9,fontFamily:'monospace',color:'#78716c'}}>cur</span>
          </div>
        </div>
        <OklchSliders lch={selectedLch} onChange={setSelectedLch}/>
        <div style={{display:'flex',flexDirection:'column',gap:0,overflowY:'auto',overflowX:'hidden',flex:1}}>
          {colorHistory.map(({lch,hex},i)=>(
            <button key={`${hex}-${i}`} onClick={()=>setSelectedLch(lch)} title={hex}
              style={{backgroundColor:hex,height:32,width:'100%',border:'none',padding:0,margin:0,display:'block',cursor:'pointer',flexShrink:0}}/>
          ))}
        </div>
      </div>

      {/* ── Resample Modal ── */}
      {showResample&&(
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={()=>setShowResample(false)}>
          <div className="bg-white p-6 shadow-2xl w-96" onClick={e=>e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h2 className="font-bold text-sm">Resample Canvas</h2>
              <button onClick={()=>setShowResample(false)} className="text-stone-400 hover:text-stone-900 font-bold text-lg">✕</button>
            </div>
            <p className="text-xs text-stone-500 mb-4">Nearest-neighbor resampling — colours are never blended, palette stays exact.</p>
            <div className="mb-4">
              <label className="block text-xs font-bold mb-2">Target size</label>
              <div className="flex flex-wrap gap-1 mb-3">
                {PRESET_SIZES.map(s=>(
                  <button key={s} onClick={()=>setTargetSize(s)}
                    className={`px-3 py-1.5 text-xs font-medium border-2 ${targetSize===s?'bg-stone-900 text-white border-stone-900':s===gridSize?'border-stone-200 text-stone-400 bg-stone-50':'border-stone-300 hover:border-stone-600'}`}>
                    {s}×{s}{s===gridSize?' ←':''}
                  </button>
                ))}
              </div>
              <label className="block text-xs text-stone-500 mb-1">Custom: {targetSize}×{targetSize}</label>
              <input type="range" min="4" max="64" value={targetSize}
                onChange={e=>setTargetSize(parseInt(e.target.value))} className="w-full"/>
            </div>
            <div className="flex gap-4 items-start mb-5">
              <div className="flex-1 text-center">
                <p className="text-xs text-stone-400 mb-1">Current ({gridSize}×{gridSize})</p>
                <div className="border-2 border-stone-200 inline-block"><ResamplePreview pixels={pixels} fromSize={gridSize} toSize={gridSize}/></div>
              </div>
              <div className="flex items-center pt-8 text-stone-400 font-bold text-lg">→</div>
              <div className="flex-1 text-center">
                <p className="text-xs text-stone-400 mb-1">Preview ({targetSize}×{targetSize})</p>
                <div className="border-2 border-stone-600 inline-block"><ResamplePreview pixels={pixels} fromSize={gridSize} toSize={targetSize}/></div>
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={()=>setShowResample(false)} className="flex-1 py-2 text-xs font-medium border-2 border-stone-300 hover:bg-stone-100">Cancel</button>
              <button onClick={()=>{setPixelsWithRef(resampleNearest(pixels,gridSize,targetSize));setGridSize(targetSize);setShowResample(false);}}
                disabled={targetSize===gridSize}
                className="flex-1 py-2 text-xs font-medium bg-stone-900 text-white hover:bg-stone-700 disabled:opacity-40">
                Apply {targetSize}×{targetSize}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Confirm Load ── */}
      {confirmLoad&&(
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={()=>setConfirmLoad(null)}>
          <div className="bg-white p-6 shadow-2xl w-72" onClick={e=>e.stopPropagation()}>
            <h2 className="font-bold text-sm mb-1">Load "{confirmLoad.name}"?</h2>
            <p className="text-xs text-stone-500 mb-4">Current canvas will be replaced. Save it first if needed.</p>
            <img src={confirmLoad.thumb} alt="preview" className="w-20 h-20 mx-auto mb-4 border-2 border-stone-200" style={{imageRendering:'pixelated'}}/>
            <div className="flex gap-2">
              <button onClick={()=>setConfirmLoad(null)} className="flex-1 py-2 text-xs font-medium border-2 border-stone-300 hover:bg-stone-100">Cancel</button>
              <button onClick={()=>loadVersion(confirmLoad)} className="flex-1 py-2 text-xs font-medium bg-stone-900 text-white hover:bg-stone-700">Load</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Confirm Delete ── */}
      {confirmDelete&&(
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={()=>setConfirmDelete(null)}>
          <div className="bg-white p-6 shadow-2xl w-72" onClick={e=>e.stopPropagation()}>
            <h2 className="font-bold text-sm mb-1">Delete "{confirmDelete.name}"?</h2>
            <p className="text-xs text-stone-500 mb-4">This can't be undone.</p>
            <img src={confirmDelete.thumb} alt="preview" className="w-20 h-20 mx-auto mb-4 border-2 border-stone-200" style={{imageRendering:'pixelated'}}/>
            <div className="flex gap-2">
              <button onClick={()=>setConfirmDelete(null)} className="flex-1 py-2 text-xs font-medium border-2 border-stone-300 hover:bg-stone-100">Cancel</button>
              <button onClick={()=>{deleteVersion(confirmDelete.id);setConfirmDelete(null);}} className="flex-1 py-2 text-xs font-medium bg-red-600 text-white hover:bg-red-700">Delete</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Confirm Random Fill ── */}
      {showRandomFill&&(
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={()=>setShowRandomFill(false)}>
          <div className="bg-white p-6 shadow-2xl w-72" onClick={e=>e.stopPropagation()}>
            <h2 className="font-bold text-sm mb-1">Replace canvas with random fill?</h2>
            <p className="text-xs text-stone-500 mb-4">Current pixels will be overwritten. Save a version first if you want to keep this.</p>
            <div className="flex gap-2">
              <button onClick={()=>setShowRandomFill(false)} className="flex-1 py-2 text-xs font-medium border-2 border-stone-300 hover:bg-stone-100">Cancel</button>
              <button onClick={applyRandomFill} className="flex-1 py-2 text-xs font-medium bg-stone-900 text-white hover:bg-stone-700">Fill</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Confirm Clear ── */}
      {confirmClear&&(
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={()=>setConfirmClear(false)}>
          <div className="bg-white p-6 shadow-2xl w-72" onClick={e=>e.stopPropagation()}>
            <h2 className="font-bold text-sm mb-1">Clear the canvas?</h2>
            <p className="text-xs text-stone-500 mb-4">All pixels will be erased. Save a version first if you want to keep this.</p>
            <div className="flex gap-2">
              <button onClick={()=>setConfirmClear(false)} className="flex-1 py-2 text-xs font-medium border-2 border-stone-300 hover:bg-stone-100">Cancel</button>
              <button onClick={()=>{setPixelsWithRef(Array.from({length:gridSize},()=>Array(gridSize).fill(null)));setConfirmClear(false);}} className="flex-1 py-2 text-xs font-medium bg-stone-900 text-white hover:bg-stone-700">Clear</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Export Modal ── */}
      {showExport&&(
        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50" onClick={()=>setShowExport(false)}>
          <div className="bg-white p-6 shadow-2xl max-w-sm w-full mx-4" onClick={e=>e.stopPropagation()}>
            <div className="flex justify-between items-center mb-3">
              <h2 className="font-bold text-sm">Export PNG</h2>
              <button onClick={()=>setShowExport(false)} className="text-stone-400 hover:text-stone-900 font-bold text-lg">✕</button>
            </div>
            <p className="text-xs text-stone-500 mb-3">Right-click the image → <strong>Save Image As…</strong></p>
            <div className="border-2 border-stone-200 bg-stone-50 p-2 flex justify-center">
              <img src={exportURL} alt="export" style={{width:256,height:256,imageRendering:'pixelated',display:'block'}}/>
            </div>
            <p className="text-xs text-stone-400 mt-2 text-center">512×512px · no grid lines</p>
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PixelArtTool />);
  </script>
</body>
</html>
